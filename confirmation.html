<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patel Food - Confirm Order</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>🍔 PATEL FOOD</h1>
  <p>Delicious Food Delivered</p>
</header>

<div class="container">
  <h2 class="section-title">Confirm Your Order</h2>

  <div class="confirmation-box">
    <h3 style="color: #ff5733; margin-bottom: 20px;">📦 Order Summary</h3>
    <div id="orderSummary">
      <!-- Order items will be displayed here -->
    </div>
    
    <div class="address-section">
      <h3 style="color: #ff5733; margin-bottom: 15px;">📍 Delivery Address</h3>
      <textarea id="deliveryAddress" placeholder="Enter your complete delivery address" rows="3" style="width: 100%; padding: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; resize: vertical;"></textarea>
    </div>
    
    <div class="total-section" style="margin: 20px 0; text-align: right;">
      <h3 style="color: #ff5733;">Total: ₹<span id="totalPrice">0</span></h3>
    </div>
    
    <div style="display: flex; gap: 15px; justify-content: center;">
      <button class="btn btn-outline" onclick="goBack()">← Back to Menu</button>
      <button class="btn" onclick="confirmOrder()">Confirm Order</button>
    </div>
    
    <p class="msg" id="confirmMsg"></p>
  </div>
</div>

<footer>
  <p>Email: foodie@email.com | Phone: +91 9512206922</p>
</footer>

<script src="script.js"></script>
</body>
</html>
