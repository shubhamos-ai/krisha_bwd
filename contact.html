<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patel Food - Contact</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>🍔 PATEL FOOD</h1>
  <p>Delicious Food Delivered</p>
</header>

<div class="container">
  <h2>Contact Us</h2>

  <div class="info-box">
    <p>📧 Email: foodie@email.com</p>
    <p>📞 Phone: +91 9512206922</p>
    <p>📍 Address: 12 Food Street, Ahmedabad, Gujarat</p>
    <p>🕐 Hours: Mon–Sat, 10am – 10pm</p>

  <form class="form-box" id="contactForm">

    <button type="submit" class="btn">Send Message</button>
    <p class="msg" id="contactMsg"></p>

</div>

<footer>
  <p>Email: foodie@email.com | Phone: +91 9512206922</p>
</footer>

<script src="script.js"></script>
</body>
</html>
