<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patel Food - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>🍔 PATEL FOOD</h1>
  <p>Delicious Food Delivered</p>
</header>

<div class="container">
  <h2 class="section-title">Login to Your Account</h2>

  <div class="form-box">
    <h3 style="color: #ff5733; margin-bottom: 20px; text-align: center;">👤 Welcome Back!</h3>
    <form id="loginForm">
      <label for="loginEmail">Email</label>
      <input type="email" id="loginEmail" placeholder="Enter your email" required>
      
      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password" required>
      
      <button type="submit" class="btn form-btn">Login Now</button>
      <p class="msg" id="loginMsg"></p>
      
      <div style="text-align: center; margin-top: 20px; color: #ccc;">
        <p>New to Patel Food? <a href="index.html" style="color: #ff5733;">Start from Home</a></p>
      </div>
    </form>
  </div>
</div>

<footer>
  <p>Email: foodie@email.com | Phone: +91 9512206922</p>
</footer>

<script src="script.js"></script>
</body>
</html>
